<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | JEE Saathi</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0a1931; /* Dark Theme */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background-color: #ffffff;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
        }
        .btn-admin {
            background-color: #185adb;
            color: white;
            font-weight: 600;
            border-radius: 10px;
            padding: 10px;
            width: 100%;
            transition: 0.3s;
        }
        .btn-admin:hover { background-color: #0a1931; color: white;}
    </style>
</head>
<body>

    <div class="login-card">
        <h3 class="fw-bold mb-1" style="color: #0a1931;">Mentor Portal</h3>
        <p class="text-muted mb-4 small">Restricted Access Only</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} p-2 small">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/admin_login" method="POST">
            <div class="mb-3 text-start">
                <label class="form-label small fw-bold text-muted">Admin ID</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fa-solid fa-user-shield"></i></span>
                    <input type="text" name="username" class="form-control" required>
                </div>
            </div>
            
            <div class="mb-4 text-start">
                <label class="form-label small fw-bold text-muted">Secret Passcode</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fa-solid fa-key"></i></span>
                    <input type="password" name="password" class="form-control" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-admin">Secure Login</button>
        </form>
        
        <a href="/" class="d-block mt-4 small text-muted text-decoration-none"><i class="fa-solid fa-arrow-left me-1"></i> Back to Main Site</a>
    </div>

</body>
</html>
