<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentor Login | JEE Saathi</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8faff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        .brand-logo { font-size: 1.8rem; font-weight: 700; color: #0a1931; text-decoration: none; text-align: center; display: block; margin-bottom: 5px; }
        .brand-logo span { color: #185adb; }
        .btn-mentor { background-color: #1fa463; color: white; border-radius: 10px; padding: 12px; font-weight: 600; width: 100%; border: none; transition: 0.3s; }
        .btn-mentor:hover { background-color: #167d4b; }
    </style>
</head>
<body>

    <div class="login-card">
        <a href="/" class="brand-logo">JEE <span>SAATHI</span></a>
        <h3 class="text-center fw-bold mt-2 mb-1" style="color: #0a1931;">Mentor Portal</h3>
        <p class="text-center text-muted small mb-4">Secure access for verified guides</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} p-2 small text-center">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/mentor_login" method="POST">
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">Official Email</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fa-regular fa-envelope text-muted"></i></span>
                    <input type="email" class="form-control" name="email" placeholder="mentor@jeesaathi.com" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label small fw-bold text-muted">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fa-solid fa-lock text-muted"></i></span>
                    <input type="password" class="form-control" name="password" placeholder="Enter password" required>
                </div>
            </div>

            <button type="submit" class="btn-mentor">Access Workspace</button>
        </form>

        <div class="mt-4 text-center">
            <a href="/login" style="font-size: 0.85rem; color: #666; text-decoration: none;">
                <i class="fa-solid fa-arrow-left me-1"></i> Back to Student Login
            </a>
        </div>
    </div>

</body>
</html>
